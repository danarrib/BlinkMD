name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Generate icon (PNG only)
        run: magick -background none blinkmd-icon.svg -resize 256x256 blinkmd-256.png
        shell: cmd

      - name: Configure
        run: cmake -B build-windows -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-windows --config Release

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            imagemagick

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Generate icon (PNG only)
        run: convert -background none blinkmd-icon.svg -resize 256x256 blinkmd-256.png

      - name: Configure
        run: cmake -B build-linux -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-linux -- -j$(nproc)
